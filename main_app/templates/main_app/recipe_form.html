{% extends "base.html" %}
{% block content %}

<section class="form-card">
  <h1>{% if object %}Edit Recipe{% else %}Add Recipe{% endif %}</h1>

  <form method="post" class="styled-form">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="btn submit">Save</button>
    <a href="{% url 'recipe-index' %}" class="btn secondary">Cancel</a>
  </form>
</section>

{% endblock %}
