{% extends "base.html" %}
{% block content %}
  <h1>Delete Recipe</h1>
  <p>Are you sure you want to delete "<strong>{{ recipe.title }}</strong>"?</p>

  <form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
  </form>

  <p><a href="{% url 'recipe-detail' recipe.id %}">Cancel</a></p>
{% endblock %}
