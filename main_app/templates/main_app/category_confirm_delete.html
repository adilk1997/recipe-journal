{% extends "base.html" %}
{% block content %}
<h1>Delete Category</h1>

<p>Are you sure you want to delete "{{ category.name }}"?</p>

<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn danger">Yes, delete</button>
</form>

<a href="{% url 'category-index' %}" class="btn secondary">Cancel</a>
{% endblock %}
